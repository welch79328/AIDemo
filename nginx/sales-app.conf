# Sales Performance Application - Nginx 反向代理配置
#
# 安裝說明：
# 1. sudo cp nginx/sales-app.conf /etc/nginx/sites-available/sales-app
# 2. sudo ln -s /etc/nginx/sites-available/sales-app /etc/nginx/sites-enabled/
# 3. sudo rm -f /etc/nginx/sites-enabled/default
# 4. sudo nginx -t
# 5. sudo systemctl reload nginx

server {
    listen 80;
    server_name _;  # 接受所有域名/IP

    # 訪問日誌
    access_log /var/log/nginx/sales-app-access.log;
    error_log /var/log/nginx/sales-app-error.log;

    # 安全標頭
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Backend API 代理
    location /api/ {
        proxy_pass http://localhost:8001/api/;
        proxy_http_version 1.1;

        # WebSocket 支援（如果需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 代理標頭
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超時設定
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API 文檔
    location /docs {
        proxy_pass http://localhost:8001/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://localhost:8001/openapi.json;
        proxy_set_header Host $host;
    }

    # Frontend 應用
    location / {
        proxy_pass http://localhost:8087/;
        proxy_http_version 1.1;

        # WebSocket 支援（Vite HMR）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 代理標頭
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超時設定
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 靜態資源快取（生產環境）
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:8087;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 健康檢查端點
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
