version: '3.8'

services:
  # PostgreSQL 資料庫
  postgres:
    image: postgres:16-alpine
    container_name: sales-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sales_performance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: Asia/Taipei
    ports:
      - "5434:5432"  # 避免與其他 PostgreSQL 容器衝突
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Redis 快取
  redis:
    image: redis:7-alpine
    container_name: sales-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  # FastAPI 後端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sales-backend
    restart: unless-stopped
    environment:
      # 資料庫設定
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/sales_performance

      # Redis 設定（可選）
      REDIS_URL: redis://redis:6379/0

      # CORS 設定
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8087,http://localhost:8001}

      # OpenAI API 設定
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-2000}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.7}

      # 應用設定
      APP_NAME: 業務行動成效評估系統
      DEBUG: true
      TZ: Asia/Taipei
    ports:
      - "8001:8000"  # 避免與其他後端 API 衝突
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - app-network

  # Vue 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sales-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ""
      VITE_APP_TITLE: 業務行動成效評估系統
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    networks:
      - app-network

  # Nginx 反向代理（對外 8087 端口）
  nginx:
    image: nginx:alpine
    container_name: sales-nginx
    restart: unless-stopped
    ports:
      - "8087:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network

  # Adminer - 資料庫管理介面
  adminer:
    image: adminer:latest
    container_name: sales-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      - postgres
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
