# Alembic 配置文件

[alembic]
# 遷移腳本的路徑
script_location = alembic

# 版本路徑格式
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 時區設定
timezone = Asia/Taipei

# 輸出編碼
output_encoding = utf-8

# 資料庫連線 URL（從環境變數讀取）
# 本地開發使用 localhost:5434，Docker 內使用 postgres:5432
sqlalchemy.url = postgresql+asyncpg://postgres:postgres123@localhost:5434/sales_performance


[post_write_hooks]


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
